apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: allow-ingress-namespaces-netpol
  annotations:
    policies.kyverno.io/title: Add Network Policy
    policies.kyverno.io/category: Multi-Tenancy, EKS Best Practices
    policies.kyverno.io/subject: NetworkPolicy
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Allow ingress from selected namespaces
spec:
  generateExisting: true
  rules:
  - name: allow-ingress-namespaces
    skipBackgroundRequests: true
    match:
      any:
      - resources:
          kinds:
          - Namespace
    generate:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      name: allow-ingress-namespaces
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      data:
        spec:
          podSelector: {} # Select all pods in namespace1
          policyTypes:
          - Ingress
          ingress:
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ingress:
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ingress-nginx
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kyverno
