apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'argocd'
spec:
  destination:
    name: 'salaserver'
    namespace: 'argocd'
    server: ''
  source:
    path: 'manifests'
    repoURL: 'https://github.com/argoproj/argo-cd.git'
    targetRevision: HEAD
    directory:
      recurse: false
      include: 'install.yaml'
  sources: []
  project: 'salaserver'

