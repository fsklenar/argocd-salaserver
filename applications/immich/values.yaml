immich:

  controllers:
    main:
      containers:
        main:
          env:
            REDIS_HOSTNAME: redis-service
            TZ: "Europe/Bratislava"
            IMMICH_TELEMETRY_INCLUDE: all
            DB_HOSTNAME: "immich-postgres-service"
            DB_USERNAME: "immich"
            DB_DATABASE_NAME: "immich"
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-secret
                  key: db-password
          image:
            tag: v2.7.5

  immich:
    metrics:
      enabled: true
    persistence:
      library:
        existingClaim: virtiofs-psql-immich-claim #common storage for Immich and PostgreSQL (use different if you need to split them)
    configuration:
      backup:
        database:
          enabled: true
          cronExpression: "10 23 * * *"   # daily at 2 AM
          keepLastAmount: 3            # how many backups to retain

  server:
    enabled: true
