apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'kubernetes-dashboard'
  namespace: argocd
spec:
  destination:
    name: 'salaserver'
    namespace: 'kubernetes-dashboard'
    server: ''
  source:
    path: ''
    repoURL: 'https://kubernetes.github.io/dashboard/'
    targetRevision: '7.10.0'
    chart: 'kubernetes-dashboard'
  sources: []
  project: 'salaserver'
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - '--helm-values'
      - 'chart/values.yaml'
---
apiVersion: v1
kind: Namespace
metadata:
  name: kubernetes-dashboard
  labels:
    name: kubernetes-dashboard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kd-admin-user
  namespace: kubernetes-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kd-admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: kd-admin-user
  namespace: kubernetes-dashboard
---
apiVersion: v1
kind: Secret
metadata:
  name: kd-admin-user
  namespace: kubernetes-dashboard
  annotations:
    kubernetes.io/service-account.name: "kd-admin-user"
type: kubernetes.io/service-account-token
#kubectl get secret kd-admin-user -n kubernetes-dashboard -o jsonpath="{.data.token}" | base64 -d
#kubectl -n kubernetes-dashboard port-forward service/kubernetes-dashboard-kong-proxy 8443:443
