apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gitlab
  name: redis-deployment
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.8.0
        command: ["redis-server", "--protected-mode", "no"]
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: gitlab
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
