apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab-rails-db
  namespace: gitlab
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: gitlabhq_production
      owner: gitlab
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;
        - CREATE EXTENSION IF NOT EXISTS btree_gist;
        - CREATE EXTENSION IF NOT EXISTS plpgsql;
        - CREATE EXTENSION IF NOT EXISTS amcheck;
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-gitlab-rails-db-1
  namespace: gitlab
spec:
  storageClassName: "local-storage"
  accessModes:
  - ReadWriteOnce
  local:
    path: /srv/virtiofs/gitlab/data-gitlab-postgresql-cn
  capacity:
    storage: 5Gi
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  claimRef:
    name: gitlab-rails-db-1
    namespace: gitlab
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: NotIn
          values:
          - controlplane
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    cnpg.io/nodeSerial: "1"
    cnpg.io/operatorVersion: 1.30.0
    cnpg.io/pvcStatus: ready
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: cloudnative-pg
    app.kubernetes.io/name: postgresql
    cnpg.io/cluster: gitlab-rails-db
    cnpg.io/instanceName: gitlab-rails-db-1
    cnpg.io/instanceRole: primary
    cnpg.io/pvcRole: PG_DATA
    role: primary
  name: gitlab-rails-db-1
  namespace: gitlab
  ownerReferences:
  - apiVersion: postgresql.cnpg.io/v1
    controller: true
    kind: Cluster
    name: gitlab-rails-db
    uid: 165a8707-5a62-4f1c-b7c4-8d0b258dbea1
  resourceVersion: "18238126"
  uid: 9738968a-72db-4175-bd58-b6267d10fc3a
spec:
  storageClassName: "local-storage"
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeMode: Filesystem
  volumeName: pv-gitlab-rails-db-1


