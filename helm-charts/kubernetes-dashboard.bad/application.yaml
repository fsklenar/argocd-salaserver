apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
spec:
  project: salaserver
  sources:
    - repoURL: https://kubernetes.github.io/dashboard/
      chart: kubernetes-dashboard
      targetRevision: 7.10.0
      helm:
        valueFiles:
          - $values/values.yaml
    - repoURL: 'https://github.com/fsklenar/argocd-salaserver/tree/main/helm-charts/kubernetes-dashboard/'
      targetRevision: HEAD
      ref: values
      #path: ''
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubernetes-dashboard
  # syncPolicy:
  #   syncOptions:
  #     - '--helm-values'
  #     - 'values.yaml'
