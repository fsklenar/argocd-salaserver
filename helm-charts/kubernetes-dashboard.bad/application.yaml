apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
spec:
  project: salaserver
  source:
    - repoURL: https://kubernetes.github.io/dashboard/
      path: kubernetes-dashboard
      targetRevision: 7.10.0
      helm:
        valueFiles:
          - '$values/values.yaml'
  source:
    repoURL: 'https://github.com/fsklenar/argocd-salaserver.git'
    targetRevision: HEAD
    ref: values
    path: 'helm-charts/kubernetes-dashboard.bad/'
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubernetes-dashboard
  # syncPolicy:
  #   syncOptions:
  #     - '--helm-values'
  #     - 'values.yaml'
