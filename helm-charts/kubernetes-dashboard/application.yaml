apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
spec:
  project: salaserver
  sources:
    - repoURL: 'https://kubernetes.github.io/dashboard'
      chart: 'kubernetes-dashboard'
      targetRevision: 7.10.0
      helm:
        values: |
          web:
            containers:
              resources:
                requests:
                  cpu: 150m
                  memory: 250Mi
        #ignoreMissingValueFiles: true
    # - repoURL: 'https://github.com/fsklenar/argocd-salaserver'
    #   targetRevision: HEAD
    #   ref: values
    #   path: 'helm-charts/kubernetes-dashboard'
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubernetes-dashboard
  # syncPolicy:
  #   syncOptions:
  #     - '--helm-values'
  #     - 'values.yaml'
