apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applicationset-chart
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      directories:
      - path: 'helm-charts/**'
      repoURL: 'https://github.com/fsklenar/argocd-salaserver.git'
      revision: HEAD
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: "salaserver"
      source:
        path: '{{.path.path}}'
        repoURL: '{{app.repo}}'
        targetRevision: '{{app.revision}}'
        chart: '{{app.chart}}'
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - '--helm-values'
          - 'chart/values.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
