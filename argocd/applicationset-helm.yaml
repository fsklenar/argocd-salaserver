
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applicationsethelm
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      files:
      - path: 'helm-charts/**/config.json'
      repoURL: 'https://github.com/fsklenar/argocd-salaserver.git'
      revision: HEAD
      values:
        base_dir: "{{index .path.segments 0}}/{{index .path.segments 1}}"
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: "salaserver"
      sources:
      - repoURL: '{{.app.repo}}'
        chart: '{{.app.chart}}'
        targetRevision: '{{.app.revision}}'
        path: '{{.path.path}}'
        helm:
          valueFiles:
          - 'values.yaml'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        syncOptions:
          - '--helm-values'
          - '{{.path.path}}/values.yaml'

