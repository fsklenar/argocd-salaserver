
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applicationset
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      directories:
      - path: 'helm-charts/**'
      repoURL: 'https://github.com/fsklenar/argocd-salaserver.git'
      revision: HEAD
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: "salaserver"
      sources:
      - repoURL: https://github.com/fsklenar/argocd-salaserver.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        chart: sealed-secrets
        repoURL: https://bitnami-labs.github.io/sealed-secrets
        targetRevision: 1.16.1
        helm:
          releaseName: sealed-secrets
          valueFiles:
            -chart/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - '--helm-values'
          - 'chart/values.yaml'

